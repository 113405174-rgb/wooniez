const GENRE_COLORS = {
  "Action":"#3266ad","Animation":"#1D9E75","Science Fiction":"#7F77DD",
  "Adventure":"#BA7517","Drama":"#D85A30","Horror":"#A32D2D",
  "Comedy":"#D4537E","Fantasy":"#5DCAA7","Thriller":"#888780"
};

let chart = null;
let activeGenres = new Set(Object.keys(GENRE_COLORS));

function getFiltered(maxYear){
  return RAW.filter(d=>d.year<=maxYear && d.budget>0 && d.revenue>0);
}

function calcROI(d){return((d.revenue-d.budget)/d.budget*100);}
function calcProfit(d){return d.revenue-d.budget;}

function updateKPI(data){
  document.getElementById("kpiCount").textContent=data.length.toLocaleString();
  const avgRev=(data.reduce((s,d)=>s+d.revenue,0)/data.length);
  const avgProfit=(data.reduce((s,d)=>s+calcProfit(d),0)/data.length);
  const avgROI=(data.reduce((s,d)=>s+calcROI(d),0)/data.length);
  document.getElementById("kpiRevenue").textContent="$"+Math.round(avgRev)+"M";
  document.getElementById("kpiProfit").textContent="$"+Math.round(avgProfit)+"M";
  document.getElementById("kpiRoi").textContent=Math.round(avgROI)+"%";
}

function updateRank(data){
  const sorted=[...data].filter(d=>activeGenres.has(d.genre)).sort((a,b)=>calcProfit(b)-calcProfit(a)).slice(0,10);
  const maxP=calcProfit(sorted[0]||{revenue:1,budget:0});
  const el=document.getElementById("rankList");
  el.innerHTML=sorted.map((d,i)=>{
    const p=calcProfit(d);
    const pct=Math.round(p/maxP*100);
    const col=GENRE_COLORS[d.genre]||"#888";
    return`<div class="rank-item">
      <span class="rank-num">${i+1}</span>
      <div style="flex:1;min-width:0">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span class="rank-title" title="${d.title}">${d.title}</span>
          <span class="rank-val">$${Math.round(p)}M</span>
        </div>
        <div class="rank-bar-wrap"><div class="rank-bar" style="width:${pct}%;background:${col}"></div></div>
      </div>
    </div>`;
  }).join("");
}

function buildLegend(){
  const el=document.getElementById("legendGrid");
  el.innerHTML=Object.entries(GENRE_COLORS).map(([g,c])=>`
    <span class="leg-item" data-genre="${g}" onclick="toggleGenre('${g}')">
      <span class="leg-dot" style="background:${c};opacity:${activeGenres.has(g)?1:0.25}"></span>
      <span style="opacity:${activeGenres.has(g)?1:0.4}">${g}</span>
    </span>`).join("");
}

window.toggleGenre=function(g){
  if(activeGenres.has(g))activeGenres.delete(g);else activeGenres.add(g);
  buildLegend();
  const yr=parseInt(document.getElementById("yrSlider").value);
  updateChart(getFiltered(yr));
  updateRank(getFiltered(yr));
};

function getMinMaxProfit(data){
  const profits=data.map(d=>Math.max(0,calcProfit(d)));
  return[Math.min(...profits),Math.max(...profits)];
}

function profitToRadius(p,minP,maxP){
  if(maxP===minP)return 8;
  const t=Math.max(0,(p-minP)/(maxP-minP));
  return 4+t*34;
}

function updateChart(data){
  const visible=data.filter(d=>activeGenres.has(d.genre));
  const [minP,maxP]=getMinMaxProfit(visible);
  const datasets=Object.entries(GENRE_COLORS).filter(([g])=>activeGenres.has(g)).map(([genre,color])=>{
    const pts=visible.filter(d=>d.genre===genre).map(d=>({
      x:d.budget,y:d.revenue,r:profitToRadius(Math.max(0,calcProfit(d)),minP,maxP),
      title:d.title,profit:calcProfit(d),roi:calcROI(d),year:d.year,genre
    }));
    return{label:genre,data:pts,backgroundColor:color+"99",borderColor:color,borderWidth:1};
  });
  if(chart){
    chart.data.datasets=datasets;
    chart.update("none");
  } else {
    chart=new Chart(document.getElementById("scatterChart"),{
      type:"bubble",
      data:{datasets},
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{enabled:false}},
        scales:{
          x:{title:{display:true,text:"製作預算（百萬美元）",font:{size:11}},
            ticks:{callback:v=>"$"+v+"M",font:{size:10}},
            grid:{color:"rgba(128,128,128,0.08)"}},
          y:{title:{display:true,text:"票房收益（百萬美元）",font:{size:11}},
            ticks:{callback:v=>"$"+v+"M",font:{size:10}},
            grid:{color:"rgba(128,128,128,0.08)"}}
        },
        layout:{padding:{top:8,right:8,bottom:4,left:4}}
      }
    });
    const canvas=document.getElementById("scatterChart");
    const tip=document.getElementById("tooltip");
    canvas.addEventListener("mousemove",e=>{
      const rect=canvas.getBoundingClientRect();
      const pts=chart.getElementsAtEventForMode(e,"nearest",{intersect:true},false);
      if(pts.length){
        const p=pts[0];
        const d=chart.data.datasets[p.datasetIndex].data[p.index];
        tip.style.display="block";
        tip.style.left=(e.clientX-rect.left+12)+"px";
        tip.style.top=(e.clientY-rect.top-20)+"px";
        tip.innerHTML=`<b>${d.title}</b><span style="color:var(--color-text-secondary)">${d.year} · ${d.genre}</span><br>預算 $${d.x}M<br>收益 $${d.y}M<br>淨利 $${Math.round(d.profit)}M<br>ROI ${Math.round(d.roi)}%`;
      } else {
        tip.style.display="none";
      }
    });
    canvas.addEventListener("mouseleave",()=>tip.style.display="none");
  }
}

function refresh(){
  const yr=parseInt(document.getElementById("yrSlider").value);
  document.getElementById("yrVal").textContent=yr;
  const data=getFiltered(yr);
  updateKPI(data);
  updateChart(data);
  updateRank(data);
  buildLegend();
}

document.getElementById("yrSlider").addEventListener("input",refresh);
refresh();
</script>
